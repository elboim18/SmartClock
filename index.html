<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח זמני קודש - גרסה סופית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; }
        body {
            margin: 0; background-color: #1a120b; color: white;
            font-family: system-ui, -apple-system, sans-serif; min-height: 100vh;
        }
        .bg-temple {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #3d2f21 0%, #1a120b 100%), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Second_Temple_Model_in_the_Israel_Museum_01.jpg/1280px-Second_Temple_Model_in_the_Israel_Museum_01.jpg');
            background-size: cover; background-position: center; z-index: -2;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(26, 18, 11, 0.9));
            backdrop-filter: blur(1px); z-index: -1;
        }
        .card { background: rgba(0, 0, 0, 0.75); border: 1.5px solid rgba(212, 175, 55, 0.3); border-radius: 1.25rem; backdrop-filter: blur(10px); }
        .gold-text { color: var(--gold); }
        .btn-action { background: var(--gold); color: black; font-weight: bold; border-radius: 2rem; padding: 0.6rem; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        #live-clock { font-variant-numeric: tabular-nums; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

    <div class="bg-temple"></div>
    <div class="overlay"></div>

    <div class="container mx-auto px-4 py-6 max-w-lg">
        
        <header class="text-center mb-4 card p-5">
            <div id="live-clock" class="text-5xl font-black gold-text mb-1">00:00:00</div>
            <div id="date-display" class="text-xl font-bold">טוען תאריך...</div>
            <div id="parasha-display" class="text-lg text-yellow-100/70 italic">טוען פרשה...</div>
            <div id="location-name" class="text-[10px] text-gray-400 mt-2 tracking-widest uppercase">מזהה מיקום...</div>
        </header>

        <div class="flex gap-2 mb-4">
            <button onclick="getLocation()" class="btn-action flex-1 flex items-center justify-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                עדכן מיקום
            </button>
            <select id="city-selector" onchange="updateByCity()" class="bg-black/80 border-2 border-yellow-800/50 rounded-2xl px-4 text-white text-sm outline-none font-bold">
                <option value="Jerusalem" selected>ירושלים</option>
                <option value="Bnei Brak">בני ברק</option>
                <option value="Tel Aviv">תל אביב</option>
                <option value="Haifa">חיפה</option>
                <option value="Beer Sheva">באר שבע</option>
            </select>
        </div>

        <div id="zmanim-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-4">
            </div>

        <div class="card p-5 text-center shadow-2xl border-t-4 border-yellow-600">
            <h2 class="text-xl font-bold gold-text mb-4 italic">שבת קודש</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col items-center">
                    <svg class="text-orange-400 mb-1" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 12V2M17 12V2M3 12h18v10H3V12z"/></svg>
                    <span class="text-[10px] font-bold opacity-70">נרות</span>
                    <span id="candles-time" class="text-2xl font-black">--:--</span>
                </div>
                <div class="flex flex-col items-center border-r border-yellow-700/20">
                    <svg class="text-indigo-300 mb-1" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span class="text-[10px] font-bold opacity-70">צאת שבת</span>
                    <span id="havdalah-time" class="text-2xl font-black">--:--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour12: false});
        }, 1000);

        function formatT(iso) {
            if (!iso) return "--:--";
            return new Date(iso).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit', hour12: false});
        }

        async function getLocation() {
            document.getElementById('location-name').innerText = "מזהה מיקום...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => updateData(p.coords.latitude, p.coords.longitude),
                    () => fetchByIP()
                );
            } else { fetchByIP(); }
        }

        async function fetchByIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                updateData(data.latitude, data.longitude, data.city);
            } catch (e) { updateByCity(); }
        }

        function updateByCity() {
            const city = document.getElementById('city-selector').value;
            updateData(null, null, city);
        }

        async function updateData(lat, lon, city = "Jerusalem") {
            try {
                let urlZ = `https://www.hebcal.com/zmanim?cfg=json&city=${city}`;
                let urlS = `https://www.hebcal.com/shabbat?cfg=json&city=${city}&lg=h`;

                if (lat && lon) {
                    urlZ = `https://www.hebcal.com/zmanim?cfg=json&lat=${lat}&long=${lon}&tzid=Asia/Jerusalem`;
                    urlS = `https://www.hebcal.com/shabbat?cfg=json&lat=${lat}&long=${lon}&tzid=Asia/Jerusalem&lg=h`;
                    document.getElementById('location-name').innerText = `מיקום: ${city || 'מזוהה אוטומטית'}`;
                }

                const dDate = await (await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${new Date().getFullYear()}&gm=${new Date().getMonth()+1}&gd=${new Date().getDate()}&g2h=1`)).json();
                document.getElementById('date-display').innerText = dDate.hebrew;

                const dShab = await (await fetch(urlS)).json();
                document.getElementById('parasha-display').innerText = dShab.items.find(i => i.category === 'parashat')?.hebrew || "";
                document.getElementById('candles-time').innerText = formatT(dShab.items.find(i => i.category === 'candles')?.date);
                document.getElementById('havdalah-time').innerText = formatT(dShab.items.find(i => i.category === 'havdalah')?.date);

                const dZ = await (await fetch(urlZ)).json();
                const t = dZ.times;

                // תיקון צאת הכוכבים - בודק את כל האפשרויות
                const tzeitValue = t.tzeit850deg || t.tzeit7083deg || t.tzeit || t.tzeit42deg;

                const zMap = [
                    {n: 'עלות השחר', v: t.alotHaShachar, s: '<path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>'},
                    {n: 'הנץ החמה', v: t.sunrise, s: '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M1 12h2M21 12h2"/>'},
                    {n: 'שמע (מג"א)', v: t.sofZmanShmaMGA, s: '<path d="M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20"/>'},
                    {n: 'שמע (גר"א)', v: t.sofZmanShma, s: '<path d="M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20"/>'},
                    {n: 'סוף תפילה', v: t.sofZmanTfilla, s: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>'},
                    {n: 'חצות היום', v: t.chatzot, s: '<path d="M12 2v20M2 12h20"/>'},
                    {n: 'שקיעה', v: t.sunset, s: '<path d="M17 18a5 5 0 0 0-10 0M2 22h20"/>'},
                    {n: 'צאת כוכבים', v: tzeitValue, s: '<path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1 3-6z"/>'}
                ];

                const grid = document.getElementById('zmanim-grid');
                grid.innerHTML = '';
                zMap.forEach(z => {
                    grid.innerHTML += `
                        <div class="card p-3 flex flex-col items-center">
                            <svg class="gold-text mb-1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${z.s}</svg>
                            <div class="text-[9px] font-bold opacity-80">${z.n}</div>
                            <div class="text-lg font-black mt-1">${formatT(z.v)}</div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }
        window.onload = getLocation;
    </script>
</body>
</html>
